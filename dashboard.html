<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Creator Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .stat { font-size: 22px; margin: 10px 0; }
  </style>
</head>
<body>

<h2 id="creator-label">Loading...</h2>

<div class="stat">Total Earned: <span id="earned">$0.00</span></div>
<div class="stat">Total Paid Out: <span id="paid">$0.00</span></div>
<div class="stat">Balance: <span id="balance">$0.00</span></div>
<div class="stat">Surveys Completed: <span id="surveys">0</span></div>

<script>
const params = new URLSearchParams(window.location.search);
const creatorId = (params.get("id") || "").trim();

document.getElementById("creator-label").textContent =
  creatorId ? `Stats for creator ID: ${creatorId}` : "No creator ID provided.";

if (creatorId) {
  fetch(`https://script.google.com/macros/s/AKfycbziaO7Zj2BnhtlnI3j7dAPoKKz-SNowp91_vj7ww_4hffbALzCwVHExlqlvLAdRepPWbw/exec?action=creatorStats&id=${encodeURIComponent(creatorId)}`)
    .then(r => r.json())
    .then(data => {
      document.getElementById("earned").textContent = `$${data.earned.toFixed(2)}`;
      document.getElementById("paid").textContent = `$${data.paid.toFixed(2)}`;
      document.getElementById("balance").textContent = `$${data.balance.toFixed(2)}`;
      document.getElementById("surveys").textContent = data.surveys;
    });
}
</script>

</body>
</html>
